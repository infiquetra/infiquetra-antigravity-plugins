# =============================================================================
# tmux.conf — optimized for Claude Code Agent Teams + iTerm2 + SSH
# =============================================================================
# Usage:
#   Local (iTerm2 control mode):  tmux -CC new -s work
#   SSH:                          tmux new -s work
#   Reattach:                     tmux -CC attach -t work  (or without -CC)
#
# Copy this file to ~/.tmux.conf
# =============================================================================


# -----------------------------------------------------------------------------
# CORE SETTINGS
# -----------------------------------------------------------------------------

# Fix vim ESC delay (critical — default 500ms makes vim feel broken)
set -sg escape-time 0

# Big scrollback (agent output can be verbose)
set -g history-limit 100000

# Start numbering at 1 (matches keyboard layout, 0 is far away)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one closes (no gaps: 1,2,3 not 1,3,4)
set -g renumber-windows on

# Enable mouse (click panes, scroll, resize — works in iTerm2 and SSH)
set -g mouse on

# Focus events (lets vim/neovim detect when you switch panes)
set -g focus-events on

# Don't let programs rename your windows
set -g allow-rename off

# Activity monitoring (useful when agents are working in other windows)
setw -g monitor-activity on
set -g visual-activity off

# Silence all bells — agents creating windows should not beep
set -g bell-action none
set -g visual-bell off

# Aggressize resize — use the smallest *currently attached* client
# (matters when you have iTerm2 locally + SSH from a laptop)
setw -g aggressive-resize on


# -----------------------------------------------------------------------------
# TERMINAL / COLOR SUPPORT
# -----------------------------------------------------------------------------

# Modern terminal settings — works over SSH and locally
set -g default-terminal "tmux-256color"

# True color support (iTerm2, most modern terminals)
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ",xterm-256color:Tc"


# -----------------------------------------------------------------------------
# PREFIX KEY
# -----------------------------------------------------------------------------
# Ctrl-a is the classic "screen" prefix — more ergonomic than Ctrl-b,
# and doesn't conflict with readline (Ctrl-b = back one char).
# Works identically over SSH.

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Double-tap Ctrl-a to send literal Ctrl-a (useful in nested sessions)
bind a send-prefix


# -----------------------------------------------------------------------------
# PANE NAVIGATION — NO PREFIX NEEDED
# -----------------------------------------------------------------------------
# Prefix + hjkl to move between panes (vim-style).
# Ctrl+h/l are reserved for iTerm2 tab navigation — leave them alone.

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# -----------------------------------------------------------------------------
# WINDOW (TAB) NAVIGATION
# -----------------------------------------------------------------------------
# prefix + n/p to cycle windows (vim-mnemonic: next/prev).
# prefix + 1-9 to jump directly (tmux default, works out of the box).
#
# Window layout for agent teams:
#   Window 1: Orchestrator (main Claude session) — prefix+1 always brings you home
#   Window 2: Workers (up to 4 tiled, overflow auto-creates window 3)
#   Window 3+: Reviewers (spawned after workers complete)

bind n next-window
bind p previous-window


# -----------------------------------------------------------------------------
# SPLITTING PANES
# -----------------------------------------------------------------------------
# | and - are intuitive: | splits vertically (side by side),
# - splits horizontally (top and bottom).
# New panes open in the same directory as the current pane.

unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"   # backslash = unshifted |

# New windows also open in the current directory
bind c new-window -c "#{pane_current_path}"


# -----------------------------------------------------------------------------
# PANE RESIZING
# -----------------------------------------------------------------------------
# Prefix + HJKL (uppercase) resizes in that direction.
# -r means repeatable — hold prefix once, then tap H/J/K/L multiple times.

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Fine-grained resize: prefix + Shift+arrow (prefix required — avoids stealing
# Shift+arrow from terminal apps like vim, less, text selection)
bind S-Up    resize-pane -U 2
bind S-Down  resize-pane -D 2


# -----------------------------------------------------------------------------
# PANE LAYOUT SHORTCUTS
# -----------------------------------------------------------------------------
# These are crucial for agent teams — quickly reorganize panes.

# Prefix + = to auto-tile all panes evenly (the killer feature)
bind = select-layout tiled

# Prefix + E for even-horizontal (all panes side by side)
bind E select-layout even-horizontal

# Prefix + e for even-vertical (all panes stacked)
bind e select-layout even-vertical

# Prefix + z to zoom/unzoom current pane (fullscreen toggle)
# (this is a tmux default, but worth knowing about)
# bind z resize-pane -Z  # already default


# -----------------------------------------------------------------------------
# PANE MANAGEMENT
# -----------------------------------------------------------------------------

# Prefix + b to break current pane into its own window (new tab)
# This is how you manually overflow: too many panes? break one out.
bind b break-pane -d

# Prefix + B to join a pane from another window into this one
bind B command-prompt -p "join pane from window:" "join-pane -s '%%'"

# Prefix + x to kill pane (with confirmation)
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

# Prefix + X to kill window (with confirmation)
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# Swap panes (move a pane's position)
bind > swap-pane -D
bind < swap-pane -U


# -----------------------------------------------------------------------------
# SESSION MANAGEMENT
# -----------------------------------------------------------------------------

# Prefix + C-j to interactively pick a session/window (tree view)
bind C-j choose-tree -Zs

# Prefix + w: window tree (all windows, fullscreen) — great with 10+ agent windows
bind w choose-tree -wZ

# Prefix + f: find window by name
bind f command-prompt -p "find window:" "find-window -N '%%'"

# Prefix + S to create a new session
bind S command-prompt -p "new session name:" "new-session -s '%%'"

# Prefix + d to detach (default, but documenting it)
# bind d detach-client


# -----------------------------------------------------------------------------
# COPY MODE (vim-style)
# -----------------------------------------------------------------------------

setw -g mode-keys vi

# Enter copy mode with prefix + [  (default)
# Or prefix + v (more vim-like)
bind v copy-mode

# In copy mode:
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi y      send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# Mouse drag: copy selection to macOS clipboard on release
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Search with / in copy mode (already default with vi keys)


# -----------------------------------------------------------------------------
# RELOAD CONFIG
# -----------------------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "  Config reloaded!"


# -----------------------------------------------------------------------------
# STATUS BAR — green-on-black theme (matches iTerm2)
# -----------------------------------------------------------------------------

set -g status-position bottom
set -g status-interval 5

# Pure black background, dim grey default text
set -g status-style "bg=black,fg=colour240"

# Left: session name in green
set -g status-left-length 30
set -g status-left "#[fg=green,bold] #S #[fg=colour240,nobold]│ "

# Right: current pane title (agent name when zoomed) + host + time
set -g status-right-length 80
set -g status-right "#[fg=green]#{pane_title} #[fg=colour240]│ #[fg=colour248]#H #[fg=colour240]│ %H:%M "

# Window tabs: index:name[pane_count] — truncated to 15 chars to fit many windows
# @agent_color is set per-window by agent-overflow.sh when a pane is routed.
# Falls back to colour240 (inactive) or green (active) for non-agent windows.
setw -g window-status-format "#[fg=#{?#{@agent_color},#{@agent_color},colour240}] #I:#{=15:window_name}[#{window_panes}] "
setw -g window-status-current-format "#[fg=#{?#{@agent_color},#{@agent_color},green},bold] #I:#{=15:window_name}[#{window_panes}] "

# -----------------------------------------------------------------------------
# PANE BORDERS — agent names + active/inactive distinction
# -----------------------------------------------------------------------------

# Show agent names in the top border line of each pane
# (Claude Code sets pane_title to the agent name automatically)
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=green#,bold],#[fg=colour240]}#{pane_title} "

# Border line colors: green for active, dark grey for inactive
set -g pane-border-style "fg=colour236"
set -g pane-active-border-style "fg=green"

# Dim inactive panes: slightly grey text + near-black bg
# Active pane: bright green text + pure black bg (matches iTerm2 exactly)
set -g window-style 'fg=colour242,bg=colour233'
set -g window-active-style 'fg=colour46,bg=black'


# =============================================================================
# AUTO-TILE + OVERFLOW HOOK FOR AGENT TEAMS
# =============================================================================
# When a new pane is created (by Claude Code spawning an agent, or manually):
#
#   - If the window has 4 or fewer panes: auto-tile into an even grid.
#   - If the window would exceed 4 panes: break the new pane into its own
#     window instead. This keeps each window as a clean 2x2 agent grid.
#
# Window layout that results:
#   Window 1: Orchestrator (main Claude, stays full-screen — don't split this)
#   Window 2: First 4 agents (2x2 tiled grid)
#   Window 3: Next batch of agents (2x2 tiled grid), created automatically
#   ...and so on.
#
# The threshold is 4 panes per window. Adjust MAX_PANES below if you want
# more or fewer agents per window (e.g., 2 for a larger 2-pane layout,
# 9 for a 3x3 grid on a large monitor).

# The overflow logic lives in a companion script to avoid tmux's $VAR expansion
# eating shell variables before /bin/sh ever sees them.
# Install: cp docs/example_tmux.conf ~/.tmux.conf
#          cp docs/agent-overflow.sh ~/.config/tmux/agent-overflow.sh
#          chmod +x ~/.config/tmux/agent-overflow.sh
set-hook -g after-split-window "run-shell ~/.config/tmux/agent-overflow.sh"


# =============================================================================
# QUICK REFERENCE (commented — for your memory)
# =============================================================================
#
# KEY PHILOSOPHY:
#   prefix (Ctrl+a) = all tmux navigation
#   Ctrl+h/l        = iTerm2 tabs (do not bind in tmux)
#
# PANE NAVIGATION (prefix = Ctrl+a):
#   prefix + h/j/k/l  Move between panes (vim-style)
#
# WINDOW NAVIGATION:
#   prefix + n        Next window
#   prefix + p        Previous window
#   prefix + 1-9      Jump directly to window N  (1 = always orchestrator)
#
# PANE MANAGEMENT (prefix = Ctrl+a):
#   prefix + |        Split vertical (side by side)
#   prefix + -        Split horizontal (top/bottom)
#   prefix + z        Zoom/unzoom pane (fullscreen toggle)  ← use this constantly
#   prefix + =        Re-tile all panes into even grid
#   prefix + b        Break pane into its own window (manual overflow)
#   prefix + B        Join pane from another window
#   prefix + x        Kill pane (with confirmation)
#   prefix + H/J/K/L  Resize pane (repeatable)
#
# WINDOWS/SESSIONS:
#   prefix + c        New window
#   prefix + d        Detach session
#   prefix + S        New named session
#   prefix + C-j      Session/window picker (tree view)
#   prefix + w        Window tree fullscreen — best for 10+ agent windows
#   prefix + f        Find window by name
#   prefix + r        Reload this config
#
# COPY MODE (vim-style):
#   prefix + v        Enter copy mode
#   v                 Start selection
#   y                 Copy selection and exit
#   /                 Search forward
#
# CLAUDE CODE AGENT TEAMS:
#   Local (iTerm2):   tmux -CC new -s agents   (native iTerm2 pane integration)
#   SSH remote:       tmux new -s agents
#   Then run:         claude
#   Reattach:         tmux attach -t agents  (or tmux -CC attach -t agents locally)
#
#   Window layout (automatic — agent-overflow.sh routes by agent name):
#     Window 1:  Orchestrator — main Claude session, always full-screen
#     Window 2:  "workers" — up to 4 worker agents, 2x2 tiled grid
#     Window 3+: Reviewers — each gets its own full window, named after agent
#                (e.g., "security-reviewer", "devils-advocate")
#
#   Navigation pattern:
#     prefix+1         → Orchestrator (respond to Claude)
#     prefix+2         → Monitor worker 2x2 grid
#     prefix+w         → Fullscreen window tree (all agents at once)
#     prefix+n/p       → Cycle through windows
#     prefix+z         → Zoom into one agent's output
#     prefix+z again   → Back to tiled grid view
